    .option-content { display: flex; flex-direction: column; gap: 4px; }
    .option-title { font-size: 16px; font-weight: 800; color: var(--text-main); line-height: 1.3; }
    .option-desc { font-size: 14px; font-weight: 500; color: var(--text-muted); line-height: 1.4; }
    .option-card.selected .option-title { color: var(--accent); }

    .option-radio {
        width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border);
        margin-left: auto; display: flex; align-items: center; justify-content: center;

    .option-card.selected .option-radio::after { opacity: 1; }

    .q-nav { display: flex; gap: 16px; margin-top: 16px; padding-top: 32px; border-top: 1px solid var(--border); }
    .btn { padding: 14px 28px; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.2s; text-decoration: none; display: inline-flex; justify-content: center; align-items: center; border: none; }

    .btn-secondary { background: var(--surface-solid); color: var(--text-main); border: 2px solid var(--border); }

    .btn-primary { background: var(--accent); color: white; border: 2px solid var(--accent); flex: 1; box-shadow: var(--shadow-md); }

                        <div class="option-desc">Собранное устройство, которое можно потрогать и оно работает.</div>
                    </div>
                    <div class="option-radio"></div>
                </button>

                <button class="option-card" data-id="process" type="button">
                    <div class="option-icon">АСУ</div>
                    <div class="option-content">
                        <div class="option-title">Идеальный процесс</div>
                        <div class="option-desc">Система управления или пайплайн, которые идут ровно и без отклонений.</div>
                    </div>
                    <div class="option-radio"></div>
                </button>

                <button class="option-card" data-id="visual" type="button">
                    <div class="option-icon">Виз</div>
                    <div class="option-content">
                        <div class="option-title">Удобство и красота</div>
                        <div class="option-desc">Визуально сильный проект, который понятен и приятен людям.</div>
                    </div>
                    <div class="option-radio"></div>
                </button>
            </div>

            <div class="q-nav">
                <button class="btn btn-secondary" id="back-btn" type="button">← Назад</button>
                <button class="btn btn-primary" id="next-btn" type="button" disabled>Подтвердить выбор →</button>
            </div>
        </div>
    </div>
</div>

<script src="../assets/test-engine.js"></script>
<script>
const engine = window.ProftestEngine;
const state = engine ? engine.getQuestionPageState('q3') : null;
let selectedOption = state && state.answer ? state.answer.optionId : null;
const cards = document.querySelectorAll('.option-card');
const nextBtn = document.getElementById('next-btn');
const backBtn = document.getElementById('back-btn');

if (!state || !state.question) {
    window.location.replace('q1.html');
    throw new Error('Q3_STATE_MISSING');
}

if (state.redirect) {
    window.location.replace(state.redirect);
    throw new Error('Q3_REDIRECT');
}

function syncSelection() {
    cards.forEach((card) => {
        card.classList.toggle('selected', card.dataset.id === selectedOption);
    });
    nextBtn.disabled = !selectedOption;
}

cards.forEach((card) => {
    card.addEventListener('click', () => {
        selectedOption = card.dataset.id;
        syncSelection();
        nextBtn.style.transform = 'scale(1.02)';
        setTimeout(() => {
            nextBtn.style.transform = 'none';
        }, 150);
    });
});

backBtn.addEventListener('click', () => {
    window.location.href = state.previousRoute;
});

nextBtn.addEventListener('click', () => {
    if (!selectedOption) {
        return;
    }
    const session = engine.saveSingleChoice('q3', selectedOption);
    window.location.href = engine.getNextQuestionRoute(session);
});

syncSelection();
</script>
</body>
</html>
